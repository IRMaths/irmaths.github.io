<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found</title>
  <style>
    /* General Reset */
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      font-size: 16px;
      background-color: #f3f4f6;
      color: #1a1a1a;
      line-height: 1.5;
    }

    /* 404 Page Content */
    .container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      padding: 0 20px;
    }
    .container img {
      width: 200px;
      margin-bottom: 20px;
    }
    .container h1 {
      font-size: 2.5rem;
      font-weight: bold;
      color: #1a1a1a;
      margin-bottom: 10px;
    }
    .container p {
      font-size: 1.1rem;
      color: #555;
      margin-bottom: 30px;
    }
    .container a {
      text-decoration: none;
      font-weight: bold;
      font-size: 1rem;
      color: #ffffff;
      background-color: #007bff;
      padding: 10px 20px;
      border-radius: 5px;
      transition: background-color 0.3s, transform 0.2s;
    }
    .container a:hover {
      background-color: #0056b3;
      transform: translateY(-2px);
    }

    /* Footer */
    .footer {
      text-align: center;
      font-size: 0.9rem;
      color: #888;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <!-- 404 Content -->
  <div class="container">
    <img src="https://via.placeholder.com/200?text=404" alt="404 Error">
    <h1>Oops! Page Not Found</h1>
    <p>The page you are looking for doesn't exist or has been moved.</p>
    <p>You will be automatically redirected after 5 seconds.</p>
    <a href="https://irmaths.github.io">Go Back to Home</a>
  </div>

  <!-- Footer -->
  <div class="footer">
    <p>© 2024 IRMaths. All rights reserved.</p>
  </div>

  <!-- Automatic Redirect -->
  <script>
    // Automatically redirect after 5 seconds
    setTimeout(function() {
      window.location.href = "https://irmaths.github.io";
    }, 5000);
  </script>
</body>
</html>
