  <style>
    /* General Page Styling */
    body {
      font-family: 'Gill Sans', 'Gill Sans MT', Calibri, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f9;
      color: #333;
    }

    /* Header Styling */
    h1 {
      text-align: center;
      padding: 20px 0;

    .lesson-container {

    /* Individual Lesson List Styling */
    .lesson-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .lesson-list li {
      margin: 15px 0;
      padding: 10px;
      background: #f9f9f9;
      border: 1px solid #ddd;
      border-radius: 6px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .lesson-list li:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
    }

    .lesson-list a {
      text-decoration: none;
      color: #007bff;
      font-size: 18px;
      font-weight: bold;
    }

    .lesson-list a:hover {
      color: #0056b3;
    }

    /* Responsive Design */
    @media (max-width: 600px) {
      h1 {
        font-size: 1.5em;
      }

      .lesson-list a {
        font-size: 16px;
      }
