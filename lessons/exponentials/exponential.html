<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
	<title>Growth and Decay</title>
	<style>
		/* Add this CSS class to disable scrolling */
		.noscroll {
		    overflow: hidden;
		}

		/* Ensure the iframe container takes full width */
		.iframe-container {
		  width: 120%;
		  max-width: 120%;
		  overflow: hidden; /* To prevent any overflow issues */
		}

    /* Make the iframe responsive and fill the width */
    .iframe-container iframe {
      height: 105vh; /* Optional: Adjust the height to cover the full viewport height */
      border: none; /* Optional: Remove border for a cleaner look */
    }
	</style>
</head>
<body>
	<div class="iframe-container">
		<iframe 
		  src="https://docs.google.com/presentation/d/e/2PACX-1vQ2sI-hS6TDgb-3k4SOOMRvhVEC93veWpSTIplkJIBnaAIVx0TDJ-VvWNZLGAW22Sete6Rw9b9BbRxC/embed?start=false&loop=false"
		  scrolling="no"
		  allowfullscreen="true" 
		  mozallowfullscreen="true" 
		  webkitallowfullscreen="true">
	</div>
</body>
<script type="text/javascript">
	document.body.classList.add('noscroll');
</script>
</html>
