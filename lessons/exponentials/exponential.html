<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Growth and Decay</title>
	<style>
		/* Add this CSS class to disable scrolling */
		.noscroll {
		    overflow: hidden;
		}

		.iframe-container {
		    display: flex;
		    justify-content: center; /* Horizontally center */
		    align-items: center; /* Vertically center */
		    height: 100vh; /* Make the container fill the viewport */
		    background: #FFFFFF;
		}

		iframe {
		    border: none; /* Remove border for aesthetics */
		}
	</style>
</head>
<body>
	<div class="iframe-container">
		<iframe src="https://docs.google.com/presentation/d/e/2PACX-1vQ2sI-hS6TDgb-3k4SOOMRvhVEC93veWpSTIplkJIBnaAIVx0TDJ-VvWNZLGAW22Sete6Rw9b9BbRxC/embed?start=false&loop=false" width="1280" height="749" allowfullscreen="true" mozallowfullscreen="true" webkitallowfullscreen="true"></iframe>
	</div>
</body>
<script type="text/javascript">
	document.body.classList.add('noscroll');
</script>
</html>
