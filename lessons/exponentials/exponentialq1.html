<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Growth and Decay</title>
	<style>
		/* Add this CSS class to disable scrolling */
		.noscroll {
		    overflow: hidden;
		}

		iframe {
		    border: none; /* Remove border for aesthetics */
		}

		html, body {
		    margin: 0;
		    padding: 0;
		    height: 100%; /* Ensure the container spans the full viewport */
		}

		body {
		    margin: 0;
		    border: 1px solid black;
		    height: 100vh;
		    background-image: url('/lessons/exponentials/exponentialq1.png');
		    background-size: contain; /* Ensure the whole image fits within the viewport */
		    background-position: top center; /* Anchor the top of the image */
		    background-repeat: no-repeat;
		    background-color: #FFFFFF; /* Optional: Set a background color to fill empty areas */
		}

		#input1 {
			position: relative;
			left : 45vw;
			top : 60vh;
		}
		#input2 {
			position: relative;
			left : 45vw;
			top : 90vh;
		}
		#input3 {
			position: relative;
			left : 90vw;
			top : 60vh;
		}
		#input4 {
			position: relative;
			left : 90vw;
			top : 90vh;
		}
		#submit {
			position: relative;
			left : 90vw;
			top : 90vh;
		}
	</style>
</head>
<body>

	<div id="input1">
		<input type="text" id="userInput1"/>
	</div>

	<div id="input2">
		<input type="text" id="userInput2"/>
	</div>
	<div id="input3">
		<input type="text" id="userInput3"/>
	</div>
	<div id="input4">
		<input type="text" id="userInput4"/>
	</div>


    <!-- Button to Capture the Input -->
    <button id="submit" onclick="showInput()">Submit</button>

    <p id="displayResult"></p>

</body>

<script type="text/javascript">
	document.body.classList.add('noscroll');
	// Function to get and display the input text
	function showInput() {
	    var userInput = document.getElementById('userInput').value; // Get the value from the input box
	    document.getElementById('displayResult').textContent = "Correct" + userInput; // Display the result
	}
</script>
</html>
