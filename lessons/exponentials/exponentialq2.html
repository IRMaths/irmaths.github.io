<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Growth and Decay</title>
  <style>
    /* Reset margin and padding for the body */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden; /* Prevent scrollbars */
    }

    /* Ensure the iframe container takes full space */
    .iframe-container {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      padding: 0;
    }

    /* Make the iframe fill the container */
    .iframe-container iframe {
      width: 100%;
      height: 100%;
      border: none; /* Remove borders */
    }

    #input1 {
      position: absolute;
      left : 20vw;
      top : 60vh;
      height: 50px;
    }
    #input2 {
      position: absolute;
      left : 20vw;
      top : 75vh;
    }

    #submit {
      position: absolute;
      left : 90vw;
      top : 90vh;
    }

    svg {
      cursor: pointer;
    }

  </style>
</head>
<body>
  <div class="iframe-container">
    <iframe 
      src="https://docs.google.com/presentation/d/e/2PACX-1vSfxFCegQjBFfG4qNuqsgbZWOJIDVp3SFUxg0lewOPPo1ebe-G9YMd726f7cwMV0MJ3B9NhVl4v2og5/embed?start=false&loop=false&rm=minimal" 
      allowfullscreen="true" 
      mozallowfullscreen="true" 
      webkitallowfullscreen="true">
    </iframe>
  </div>

  <div id="input1"><input type="text" id="userInput1"/></div>
  <div id="input2"><input type="text" id="userInput2"/></div>





    <p id="displayResult"></p>

</body>

<script type="text/javascript">
  document.body.classList.add('noscroll');
  // Function to get and display the input text
  function showInput() {
      var userInput = document.getElementById('userInput').value; // Get the value from the input box
      document.getElementById('displayResult').textContent = "Correct" + userInput; // Display the result
  }
</script>
</html>
